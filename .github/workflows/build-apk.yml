name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Add microphone permissions to AndroidManifest.xml
        run: |
          python3 - <<'EOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()
          permissions = (
              '    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n'
              '    <uses-feature android:name="android.hardware.microphone" android:required="true" />\n'
              '    '
          )
          content = content.replace('    <application', permissions + '<application', 1)
          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)
          EOF

      - name: Patch MainActivity for reliable microphone WebView permission
        run: |
          cat > android/app/src/main/java/com/vocalflow/app/MainActivity.java << 'JAVAEOF'
          package com.vocalflow.app;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.webkit.ConsoleMessage;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              private static final int AUDIO_CODE = 1001;
              private PermissionRequest pendingPermission;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  android.webkit.WebView wv = getBridge().getWebView();
                  wv.getSettings().setMediaPlaybackRequiresUserGesture(false);
                  wv.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          boolean needsAudio = false;
                          for (String r : request.getResources()) {
                              if (PermissionRequest.RESOURCE_AUDIO_CAPTURE.equals(r)) {
                                  needsAudio = true;
                                  break;
                              }
                          }
                          if (!needsAudio) { request.deny(); return; }
                          if (ContextCompat.checkSelfPermission(MainActivity.this, Manifest.permission.RECORD_AUDIO) == PackageManager.PERMISSION_GRANTED) {
                              request.grant(request.getResources());
                          } else {
                              pendingPermission = request;
                              ActivityCompat.requestPermissions(MainActivity.this, new String[]{Manifest.permission.RECORD_AUDIO}, AUDIO_CODE);
                          }
                      }
                      @Override
                      public boolean onConsoleMessage(ConsoleMessage msg) {
                          android.util.Log.d("VocalFlow", msg.message()); return true;
                      }
                  });
              }
              @Override
              public void onRequestPermissionsResult(int code, String[] perms, int[] results) {
                  super.onRequestPermissionsResult(code, perms, results);
                  if (code == AUDIO_CODE && pendingPermission != null) {
                      if (results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED) {
                          pendingPermission.grant(pendingPermission.getResources());
                      } else {
                          pendingPermission.deny();
                      }
                      pendingPermission = null;
                  }
              }
          }
          JAVAEOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VocalFlow-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
